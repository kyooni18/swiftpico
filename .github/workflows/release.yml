name: Release SwiftPico

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: swift-actions/setup-swift@v3
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          swift --version
          if ! swift build -c release --product swiftpico 2>&1 | tee build.log; then
            while IFS= read -r line; do
              line=${line//'%'/'%25'}
              line=${line//$'\r'/'%0D'}
              line=${line//$'\n'/'%0A'}
              echo "::error title=Swift nightly build::$line"
            done < <(tail -20 build.log)
            {
              echo "### SwiftPico release build failure"
              echo '```text'
              tail -100 build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
      - name: Smoke test
        run: .build/release/swiftpico help
      - name: Package source archive
        run: tar -czf swiftpico-${GITHUB_REF_NAME}.tar.gz --exclude=.build --exclude=.git .
      - uses: softprops/action-gh-release@v2
        with:
          files: swiftpico-${{ github.ref_name }}.tar.gz
